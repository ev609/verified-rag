<svg xmlns="http://www.w3.org/2000/svg" width="780" height="452" viewBox="0 0 780 452" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="14.5">
  <rect width="780" height="452" rx="10" fill="#0d1117"/>
  <rect width="780" height="34" rx="10" fill="#161b22"/>
  <rect y="24" width="780" height="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#f85149"/>
  <circle cx="40" cy="17" r="6" fill="#d29922"/>
  <circle cx="60" cy="17" r="6" fill="#3fb950"/>
  <text x="390" y="22" fill="#8b949e" text-anchor="middle" font-size="12.5">verified-rag — examples/demo_period_aware.py</text>

  <g xml:space="preserve">
    <text x="20" y="64"  fill="#3fb950">$ <tspan fill="#c9d1d9">python examples/demo_period_aware.py</tspan></text>

    <text x="20" y="100" fill="#8b949e">ANSWER UNDER AUDIT:</text>
    <text x="20" y="122" fill="#c9d1d9">  In 2024 revenue was $4.2B ... <tspan fill="#f0883e">For 2023, ARR was $5.0B</tspan> ...</text>

    <text x="20" y="160" fill="#c9d1d9">Naive value-only verifier:  <tspan fill="#c9d1d9">5/5 'verified' (100%)</tspan>  <tspan fill="#f85149">&#8592; trusts the lie</tspan></text>
    <text x="20" y="182" fill="#c9d1d9">Period-aware verifier:      <tspan fill="#3fb950">4/5 verified  (80%)</tspan>  <tspan fill="#3fb950">&#8592; the honest number</tspan></text>
    <text x="20" y="204" fill="#c9d1d9">False citations avoided:    <tspan fill="#d29922">1</tspan></text>

    <text x="20" y="242" fill="#8b949e">--- CITED ANSWER ------------------------------------------------</text>
    <text x="20" y="264" fill="#c9d1d9">In 2024 revenue was $4.2B <tspan fill="#58a6ff">[src: 10-K, 2024, trust 1.00]</tspan>.</text>
    <text x="20" y="286" fill="#c9d1d9">In 2023 revenue was $3.5B <tspan fill="#58a6ff">[src: 10-K, 2023, trust 1.00]</tspan>.</text>
    <text x="20" y="308" fill="#c9d1d9">For 2023, ARR was $5.0B.  <tspan fill="#f85149">&#8592; not verified, not cited</tspan></text>

    <text x="20" y="346" fill="#8b949e">--- FLAGGED (not cited) -----------------------------------------</text>
    <text x="20" y="368" fill="#f85149">  value=5.0  <tspan fill="#8b949e">&#8594;</tspan>  closest fact arr_2024=5.0</text>
    <text x="20" y="390" fill="#d29922">             but claim=2023, fact=2024  (wrong period)</text>

    <text x="20" y="426" fill="#c9d1d9">faithfulness score: <tspan fill="#3fb950">0.8</tspan></text>
  </g>
